<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyRun – Upload de Arquivo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      padding: 40px;
      width: 100%;
      max-width: 540px;
    }
    h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 8px; }
    p.subtitle { color: #555; margin-bottom: 28px; font-size: .95rem; }
    .drop-zone {
      border: 2px dashed #4a90d9;
      border-radius: 10px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: background .2s;
      color: #4a90d9;
    }
    .drop-zone:hover, .drop-zone.dragover { background: #eaf3fb; }
    .drop-zone svg { width: 48px; height: 48px; margin-bottom: 10px; }
    .drop-zone p { font-size: .95rem; margin-top: 4px; color: #666; }
    #fileInput { display: none; }
    #fileName { margin-top: 12px; font-size: .9rem; color: #333; min-height: 20px; }
    button#uploadBtn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    button#uploadBtn:hover { background: #357abd; }
    button#uploadBtn:disabled { background: #a0c4e8; cursor: not-allowed; }
    #status {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .9rem;
      display: none;
    }
    #status.success { background: #e6f9ee; color: #1a7a3c; border: 1px solid #a3d9b1; }
    #status.error   { background: #fdecea; color: #b71c1c; border: 1px solid #f5a5a5; }
    .progress-wrap {
      margin-top: 14px;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      width: 0;
      background: #4a90d9;
      transition: width .3s;
    }
    h2 { margin-top: 36px; font-size: 1.1rem; color: #1a1a2e; }
    #fileList { list-style: none; margin-top: 12px; }
    #fileList li {
      padding: 8px 10px;
      background: #f7f8fa;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: .88rem;
      color: #333;
      word-break: break-all;
    }
    #fileList li:empty { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>EasyRun</h1>
    <p class="subtitle">Envie seu arquivo de forma rápida e simples.</p>

    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <strong>Clique para selecionar</strong> ou arraste o arquivo aqui
      <p>Tamanho máximo: 50 MB</p>
      <input type="file" id="fileInput" />
    </div>
    <div id="fileName"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button id="uploadBtn" disabled>Enviar Arquivo</button>
    <div id="status"></div>

    <h2>Arquivos enviados</h2>
    <ul id="fileList"></ul>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const fileNameEl = document.getElementById('fileName');
    const uploadBtn  = document.getElementById('uploadBtn');
    const status     = document.getElementById('status');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    const fileList   = document.getElementById('fileList');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      fileNameEl.textContent = `Selecionado: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      uploadBtn.disabled = false;
      hideStatus();
    }

    uploadBtn.addEventListener('click', () => {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('file', selectedFile);

      uploadBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressBar.style.width = '0';
      hideStatus();

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload');

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          progressBar.style.width = ((e.loaded / e.total) * 100) + '%';
        }
      });

      xhr.addEventListener('load', () => {
        progressWrap.style.display = 'none';
        try {
          const data = JSON.parse(xhr.responseText);
          if (xhr.status === 200) {
            showStatus('success', `✓ ${data.message} — ${data.originalname}`);
            selectedFile = null;
            fileNameEl.textContent = '';
            fileInput.value = '';
            loadFiles();
          } else {
            showStatus('error', `✗ ${data.error || 'Erro ao enviar o arquivo.'}`);
            uploadBtn.disabled = false;
          }
        } catch {
          showStatus('error', '✗ Resposta inválida do servidor.');
          uploadBtn.disabled = false;
        }
      });

      xhr.addEventListener('error', () => {
        progressWrap.style.display = 'none';
        showStatus('error', '✗ Falha na conexão com o servidor.');
        uploadBtn.disabled = false;
      });

      xhr.send(formData);
    });

    function showStatus(type, msg) {
      status.className = type;
      status.textContent = msg;
      status.style.display = 'block';
    }

    function hideStatus() {
      status.style.display = 'none';
    }

    function loadFiles() {
      fetch('/files')
        .then(r => r.json())
        .then(data => {
          fileList.innerHTML = '';
          if (data.files && data.files.length) {
            data.files.forEach(f => {
              const li = document.createElement('li');
              li.textContent = f;
              fileList.appendChild(li);
            });
          }
        })
        .catch(() => {});
    }

    loadFiles();
  </script>
</body>
</html>
